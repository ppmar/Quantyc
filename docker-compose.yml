services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    env_file:
      - .env
    environment:
      - PORT=8000
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://api:8000
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  app-data:
    driver: local
