<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — ASX Miner Pipeline</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' },
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        code, .mono { font-family: 'JetBrains Mono', monospace; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-full text-gray-100">
    <div class="min-h-full">
        <!-- Nav -->
        <nav class="bg-gray-900 border-b border-gray-800">
            <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
                <div class="flex h-14 items-center justify-between">
                    <div class="flex items-center space-x-6">
                        <a href="/" class="text-gold-400 font-bold text-lg tracking-tight">ASX Miner Pipeline</a>
                        <div class="hidden md:flex space-x-1">
                            <a href="/" class="px-3 py-2 rounded-md text-sm font-medium {% if request.path == '/' %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">Dashboard</a>
                            <a href="/companies" class="px-3 py-2 rounded-md text-sm font-medium {% if '/companies' in request.path %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">Companies</a>
                            <a href="/documents" class="px-3 py-2 rounded-md text-sm font-medium {% if '/documents' in request.path %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">Documents</a>
                            <a href="/valuations" class="px-3 py-2 rounded-md text-sm font-medium {% if '/valuations' in request.path %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">Valuations</a>
                            <a href="/review" class="px-3 py-2 rounded-md text-sm font-medium {% if '/review' in request.path %}bg-gray-800 text-white{% else %}text-gray-400 hover:text-white hover:bg-gray-800{% endif %}">Review</a>
                        </div>
                    </div>
                    <div>
                        <button onclick="triggerParse()" id="parse-btn"
                                class="bg-gold-500 hover:bg-gold-600 text-gray-900 font-semibold text-sm px-4 py-1.5 rounded-md transition">
                            Run Pipeline
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Content -->
        <main class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-6 fade-in">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        async function triggerParse() {
            const btn = document.getElementById('parse-btn');
            btn.textContent = 'Running...';
            btn.disabled = true;
            btn.classList.add('opacity-50');
            try {
                const res = await fetch('/api/parse', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({})
                });
                const data = await res.json();
                btn.textContent = 'Started!';
                setTimeout(() => {
                    btn.textContent = 'Run Pipeline';
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                }, 3000);
            } catch(e) {
                btn.textContent = 'Error';
                setTimeout(() => {
                    btn.textContent = 'Run Pipeline';
                    btn.disabled = false;
                    btn.classList.remove('opacity-50');
                }, 2000);
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
